<!DOCTYPE html>
<html>
<head>
    <title>Secure Banking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: linear-gradient(135deg, #0a3d62, #3c6382);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            color: #0a3d62;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background-color: #0a3d62;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #3c6382;
        }

        .bank-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #0a3d62;
        }

        .secure-note {
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }
    </style>

</head>

<body>

<div class="login-box">

    <div class="bank-title">FraudSecure Bank</div>

    <h2>Secure Login</h2>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    <p style="color:red;">{{ error }}</p>

    <div class="secure-note">
        🔒 Your connection is encrypted and monitored for fraud prevention
    </div>

</div>
<p>
    Don't have an account?
    <a href="{{ url_for('signup') }}">Create one here</a>
</p>
</body>
</html>
