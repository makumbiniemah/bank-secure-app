<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            background:url("{{ url_for('static', filename='images/back2.JFIF') }}");
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:rgba(0,0,0,0.75);
            padding:40px;
            border-radius:15px;
            width:450px;
            color:white;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            border:none;
            border-radius:6px;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            opacity:0.9;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        .login-link a{
            color:#4da6ff;
            text-decoration:none;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Create Account</h2>

    <form method="POST">

        <input type="email"
               name="email"
               placeholder="Email Address"
               required>

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="text"
               name="bank_name"
               placeholder="Bank Name"
               required>

        <input type="text"
               name="card_number"
               placeholder="Card Number"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Create Account
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="{{ url_for('do_login') }}">
            Login
        </a>
    </div>

</div>

</body>
</html>
