<!DOCTYPE html>
<html>
<head>
    <title>Fraud Alert Settings</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e293b;
        }

        label {
            font-weight: bold;
            color: #334155;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 20px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 5px rgba(37,99,235,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>🛡 Fraud Alert Settings</h2>
    <div class="subtitle">
        Set your secure transaction limits
    </div>

    <form method="POST">

        <label>Minimum Alert Amount</label>
        <input type="number" step="0.01" name="min_amount"
               value="{{ settings[0] }}">

        <label>Maximum Alert Amount</label>
        <input type="number" step="0.01" name="max_amount"
               value="{{ settings[1] }}">

        <button type="submit">Save Settings</button>

    </form>

</div>

</body>
</html>
