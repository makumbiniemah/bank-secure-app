<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 380px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            color: #1e293b;
            margin-bottom: 20px;
        }

        .info {
            text-align: left;
            margin-top: 10px;
        }

        .info p {
            padding: 10px;
            background: #f1f5f9;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #334155;
        }

        .label {
            font-weight: bold;
            color: #0f172a;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>👤 User Profile</h2>
    <div class="subtitle">Secure Banking Information</div>

    <div class="info">

        <p><span class="label">Email:</span> {{ user[1] }}</p>
        <p><span class="label">Username:</span> {{ user[2] }}</p>
        <p><span class="label">Bank Name:</span> {{ user[3] }}</p>
        <p><span class="label">Account Number:</span> {{ user[4] }}</p>

    </div>

    <a class="btn" href="/edit-profile">Edit Profile</a>

</div>

</body>
</html>
